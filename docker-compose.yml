version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: progress_tracker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: progress_tracker
      JWT_SECRET: change-this-to-a-long-random-string-in-production
      VAPID_PUBLIC_KEY: BDKwaXsatp_cnVVFxJw6bO-3k2dR25aQvAfUP8vp4dBRQMkUllIDSAP39AUK9Zuq-6eowM2SpCMbda6NUcqeg5Y
      VAPID_PRIVATE_KEY: QMkUllIDSAP39AUK9Zuq-6eowM2SpCMbda6NUcqeg5Y
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
